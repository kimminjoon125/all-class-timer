<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업/자습 시간 타이머</title>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
            font-weight: 500;
            font-display: swap;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            width: 480px;
            max-width: 95%;
        }

        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn {
            padding: 8px 16px;
            border-radius: 50px;
            border: 1px solid #ddd;
            background: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            color: #666;
        }

        .mode-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }

        .full-date-display {
            font-family: 'Pretendard';
            font-size: 1.15rem;
            font-weight: 600;
            color: #333;
            background: #fff;
            padding: 12px 15px;
            border: 1px solid #e1e1e1;
            border-radius: 12px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            white-space: pre;
        }

        .content-area {
            border-top: 1px solid #f0f0f0;
            padding-top: 25px;
        }

        .timer-label {
            font-size: 1rem;
            color: #666;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .remaining-timer {
            font-size: 3.2rem;
            font-weight: 600;
            color: #007bff;
            letter-spacing: -0.5px;
            margin: 0;
            line-height: 1.2;
        }

        .status-msg {
            color: #666;
            font-size: 0.9rem;
            font-weight: 400;
            margin-top: 20px;
            white-space: nowrap;
        }

        #syncStatus {
            font-size: 0.75rem;
            margin-top: 15px;
            font-weight: 500;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('weekday')">주중(수업)</button>
            <button class="mode-btn" onclick="setMode('weekend')">주말(자습)</button>
        </div>
        <div id="fullDateDisplay" class="full-date-display">0000/00/00   00:00:00   월요일</div>
        <div class="content-area">
            <div class="timer-label" id="periodLabel">- 종료까지</div>
            <div class="remaining-timer" id="remainingValue">00:00:00</div>
            <div class="status-msg" id="statusMsg">데이터 로드 중...</div>
        </div>
        <div id="syncStatus" style="color: #007bff;">서버 시간 동기화 중...</div>
    </div>

    <script>
        const schedules = {
            weekday: [
                { name: "1교시", start: [8, 30], end: [9, 20] },
                { name: "2교시", start: [9, 30], end: [10, 20] },
                { name: "3교시", start: [10, 30], end: [11, 20] },
                { name: "4교시", start: [11, 30], end: [12, 20] },
                { name: "5교시", start: [13, 30], end: [14, 20] },
                { name: "6교시", start: [14, 30], end: [15, 20] },
                { name: "7교시", start: [15, 30], end: [16, 20] },
                { name: "8교시", start: [16, 40], end: [17, 30] },
                { name: "9교시", start: [17, 40], end: [18, 30] },
                { name: "자습 1차시", start: [19, 40], end: [20, 50] },
                { name: "자습 2차시", start: [21, 0], end: [22, 10] },
                { name: "자습 3차시", start: [22, 20], end: [23, 0] }
            ],
            weekend: [
                { name: "자습 1차시", start: [8, 40], end: [10, 0] },
                { name: "자습 2차시", start: [10, 30], end: [12, 10] },
                { name: "자습 3차시", start: [13, 20], end: [14, 30] },
                { name: "자습 4차시", start: [15, 0], end: [16, 40] },
                { name: "자습 5차시", start: [17, 0], end: [18, 0] }
            ]
        };

        let currentMode = 'weekday';
        let timeOffset = 0;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.includes(mode === 'weekday' ? '주중' : '주말')) btn.classList.add('active');
            });
            updateTimer();
        }

        const timeApis = [
            async () => {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Seoul');
                const data = await res.json();
                return new Date(data.datetime).getTime();
            },
            async () => {
                const res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Seoul');
                const data = await res.json();
                return new Date(data.dateTime).getTime();
            }
        ];

        async function syncServerTime() {
            const syncLabel = document.getElementById('syncStatus');
            for (const api of timeApis) {
                try {
                    const start = Date.now();
                    const serverTime = await api();
                    const end = Date.now();
                    const latency = (end - start) / 2;
                    timeOffset = (serverTime + latency) - Date.now();
                    syncLabel.innerText = "● 서버 시간 동기화 완료";
                    syncLabel.style.color = "#4caf50";
                    setTimeout(() => syncLabel.style.opacity = '0.3', 5000);
                    return;
                } catch (e) {
                }
            }
            syncLabel.innerText = "○ 동기화 실패 (로컬 시간 사용)";
            syncLabel.style.color = "#ff4d4f";
        }

        function updateTimer() {
            const now = new Date(Date.now() + timeOffset);
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            const dayName = days[now.getDay()];

            document.getElementById('fullDateDisplay').innerText = `${year}/${month}/${date}   ${h}:${m}:${s}   ${dayName}`;

            const currentSchedule = schedules[currentMode];
            let remainingStr = "00:00:00";
            let periodName = currentMode === 'weekday' ? "-교시" : "자습 -차시";
            let statusText = "현재 수업이 없습니다.";

            for (const session of currentSchedule) {
                const startTime = new Date(now);
                startTime.setHours(session.start[0], session.start[1], 0, 0);
                const endTime = new Date(now);
                endTime.setHours(session.end[0], session.end[1], 0, 0);

                if (now >= startTime && now <= endTime) {
                    periodName = session.name;
                    statusText = `${session.name}가 진행 중입니다.`;
                    const diff = endTime - now;
                    const diffH = Math.floor(diff / (1000 * 60 * 60));
                    const diffM = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const diffS = Math.floor((diff % (1000 * 60)) / 1000);
                    remainingStr = `${String(diffH).padStart(2, '0')}:${String(diffM).padStart(2, '0')}:${String(diffS).padStart(2, '0')}`;
                    break;
                }
            }
            document.getElementById('periodLabel').innerText = `${periodName} 종료까지`;
            document.getElementById('remainingValue').innerText = remainingStr;
            document.getElementById('statusMsg').innerText = statusText;
        }

        syncServerTime();
        setInterval(syncServerTime, 60000);
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
