<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수업/자습 시간 타이머 - 다크 모드</title>
    <style>
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'Pretendard';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
            font-weight: 600;
            font-display: swap;
        }

        /* 테마 변수 설정 */
        :root {
            --bg-color: #f5f7fa;
            --container-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #007bff;
            --border-color: #e1e1e1;
            --btn-bg: #ffffff;
            --btn-text: #666666;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme='dark'] {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-sub: #a0a0a0;
            --accent-color: #3793ff;
            --border-color: #333333;
            --btn-bg: #2a2a2a;
            --btn-text: #a0a0a0;
            --shadow: rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            margin: 0;
            transition: background-color 0.3s ease;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: var(--container-bg);
            padding: 2.5rem 2rem;
            border-radius: 25px;
            box-shadow: 0 10px 30px var(--shadow);
            text-align: center;
            width: 480px;
            max-width: 90%;
            transition: all 0.3s ease;
            position: relative;
        }

        /* 다크모드 토글 버튼 */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 25px;
            cursor: pointer;
            font-size: 1.2rem;
            background: none;
            border: none;
            padding: 0;
            color: var(--text-sub);
        }

        .mode-selector {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn {
            padding: 8px 18px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: var(--btn-bg);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            color: var(--btn-text);
        }

        .mode-btn.active {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .full-date-display {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
            background: var(--container-bg);
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
            white-space: pre;
        }

        .content-area {
            border-top: 1px solid var(--border-color);
            padding-top: 30px;
        }

        .timer-label {
            font-size: 1rem;
            color: var(--text-sub);
            font-weight: 500;
            margin-bottom: 10px;
        }

        .remaining-timer {
            font-size: 3.5rem;
            font-weight: 600;
            color: var(--accent-color);
            letter-spacing: -1px;
            margin: 0;
            line-height: 1.2;
        }

        .status-msg {
            color: var(--text-sub);
            font-size: 0.95rem;
            font-weight: 400;
            margin-top: 25px;
        }

        #syncStatus {
            font-size: 0.75rem;
            margin-top: 20px;
            font-weight: 500;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
        
        <div class="mode-selector">
            <button class="mode-btn active" id="btn-weekday" onclick="setMode('weekday')">주중(수업)</button>
            <button class="mode-btn" id="btn-weekend" onclick="setMode('weekend')">주말(자습)</button>
        </div>
        
        <div id="fullDateDisplay" class="full-date-display">0000/00/00   00:00:00   월요일</div>
        
        <div class="content-area">
            <div class="timer-label" id="periodLabel">- 종료까지</div>
            <div class="remaining-timer" id="remainingValue">00:00:00</div>
            <div class="status-msg" id="statusMsg">데이터 로드 중...</div>
        </div>
        
        <div id="syncStatus" style="color: var(--accent-color);">서버 시간 동기화 중...</div>
    </div>

    <script>
        const schedules = {
            weekday: [
                { name: "1교시", start: [8, 30], end: [9, 20] },
                { name: "2교시", start: [9, 30], end: [10, 20] },
                { name: "3교시", start: [10, 30], end: [11, 20] },
                { name: "4교시", start: [11, 30], end: [12, 20] },
                { name: "5교시", start: [13, 30], end: [14, 20] },
                { name: "6교시", start: [14, 30], end: [15, 20] },
                { name: "7교시", start: [15, 30], end: [16, 20] },
                { name: "8교시", start: [16, 40], end: [17, 30] },
                { name: "9교시", start: [17, 40], end: [18, 30] },
                { name: "자습 1차시", start: [19, 40], end: [20, 50] },
                { name: "자습 2차시", start: [21, 0], end: [22, 10] },
                { name: "자습 3차시", start: [22, 20], end: [23, 0] }
            ],
            weekend: [
                { name: "자습 1차시", start: [8, 40], end: [10, 0] },
                { name: "자습 2차시", start: [10, 30], end: [12, 10] },
                { name: "자습 3차시", start: [13, 20], end: [14, 30] },
                { name: "자습 4차시", start: [15, 0], end: [16, 40] },
                { name: "자습 5차시", start: [17, 0], end: [18, 0] }
            ]
        };

        let currentMode = 'weekday';
        let timeOffset = 0;

        // 테마 토글 함수
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = '🌙';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = '☀️';
            }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-weekday').classList.toggle('active', mode === 'weekday');
            document.getElementById('btn-weekend').classList.toggle('active', mode === 'weekend');
            updateTimer();
        }

        const timeApis = [
            async () => {
                const res = await fetch('https://worldtimeapi.org/api/timezone/Asia/Seoul');
                const data = await res.json();
                return new Date(data.datetime).getTime();
            },
            async () => {
                const res = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=Asia/Seoul');
                const data = await res.json();
                return new Date(data.dateTime).getTime();
            }
        ];

        async function syncServerTime() {
            const syncLabel = document.getElementById('syncStatus');
            for (const api of timeApis) {
                try {
                    const start = Date.now();
                    const serverTime = await api();
                    const end = Date.now();
                    const latency = (end - start) / 2;
                    timeOffset = (serverTime + latency) - Date.now();
                    syncLabel.innerText = "● 서버 시간 동기화 완료";
                    syncLabel.style.color = "#4caf50";
                    setTimeout(() => syncLabel.style.opacity = '0.3', 5000);
                    return;
                } catch (e) {}
            }
            syncLabel.innerText = "○ 동기화 실패 (로컬 시간 사용)";
            syncLabel.style.color = "#ff4d4f";
        }

        function updateTimer() {
            const now = new Date(Date.now() + timeOffset);
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];
            
            document.getElementById('fullDateDisplay').innerText = `${year}/${month}/${date}   ${h}:${m}:${s}   ${days[now.getDay()]}`;

            const currentSchedule = schedules[currentMode];
            let remainingStr = "00:00:00";
            let periodName = currentMode === 'weekday' ? "-교시" : "자습 -차시";
            let statusText = "현재 예정된 일정이 없습니다.";

            for (const session of currentSchedule) {
                const startTime = new Date(now);
                startTime.setHours(session.start[0], session.start[1], 0, 0);
                const endTime = new Date(now);
                endTime.setHours(session.end[0], session.end[1], 0, 0);

                if (now >= startTime && now <= endTime) {
                    periodName = session.name;
                    statusText = `${session.name}가 진행 중입니다.`;
                    const diff = endTime - now;
                    const diffH = Math.floor(diff / 3600000);
                    const diffM = Math.floor((diff % 3600000) / 60000);
                    const diffS = Math.floor((diff % 60000) / 1000);
                    remainingStr = `${String(diffH).padStart(2, '0')}:${String(diffM).padStart(2, '0')}:${String(diffS).padStart(2, '0')}`;
                    break;
                }
            }
            document.getElementById('periodLabel').innerText = `${periodName} 종료까지`;
            document.getElementById('remainingValue').innerText = remainingStr;
            document.getElementById('statusMsg').innerText = statusText;
        }

        syncServerTime();
        setInterval(syncServerTime, 60000);
        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
